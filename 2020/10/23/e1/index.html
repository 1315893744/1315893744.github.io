span class="line">typedef struct&#123;</span><br><span class="line">    ElemType data[MaxSize];</span><br><span class="line">    int length;</span><br><span class="line">&#125;SqList;</span><br><span class="line"></span><br><span class="line">void CreateList(SqList* &amp;L,ElemType a[],int n)&#123;</span><br><span class="line">    L&#x3D;(SqList*)malloc(sizeof(SqList));</span><br><span class="line">    for(int i&#x3D;0;i&lt;n;i++)</span><br><span class="line">        L-&gt;data[i]&#x3D;a[i];</span><br><span class="line">    L-&gt;length&#x3D;n;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void InitList(SqList* &amp;L)&#123;</span><br><span class="line">    L&#x3D;(SqList*)malloc(sizeof(SqList));</span><br><span class="line">    L-&gt;length&#x3D;0;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void DestroyList(SqList* &amp;L)&#123;</span><br><span class="line">    free(L);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">bool ListEmpty(SqList* L)&#123;</span><br><span class="line">    return(L-&gt;length&#x3D;&#x3D;0);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">int ListLength(SqList* L)&#123;</span><br><span class="line">    return(L-&gt;length);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void DispList(SqList* L)&#123;</span><br><span class="line">    for(int i&#x3D;0;i&lt;L-&gt;length;i++)</span><br><span class="line">        printf(&quot;%c &quot;,L-&gt;data[i]);</span><br><span class="line">    printf(&quot;\n&quot;);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">bool GetElem(SqList* L,int i,ElemType &amp;e)&#123;</span><br><span class="line">    if(i&lt;1||i&gt;L-&gt;length)</span><br><span class="line">        return false;</span><br><span class="line">    e&#x3D;L-&gt;data[i-1];</span><br><span class="line">    return true;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">int LocateElem(SqList *L,ElemType e)&#123;</span><br><span class="line">    int i&#x3D;0;</span><br><span class="line">    while(i&lt;L-&gt;length&amp;&amp;L-&gt;data[i]!&#x3D;e)</span><br><span class="line">        i++;</span><br><span class="line">    if(i&gt;&#x3D;L-&gt;length)</span><br><span class="line">        return 0;</span><br><span class="line">    else</span><br><span class="line">        return i+1;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">bool ListInsert(SqList *&amp;L,int i,ElemType e)&#123;</span><br><span class="line">    int j;</span><br><span class="line">    if(i&lt;1||i&gt;L-&gt;length+1||L-&gt;length&#x3D;&#x3D;MaxSize)</span><br><span class="line">        return false;</span><br><span class="line">    i--;</span><br><span class="line">    for(j&#x3D;L-&gt;length;j&gt;i;j--)</span><br><span class="line">    L-&gt;data[j]&#x3D;L-&gt;data[j-1];</span><br><span class="line">    L-&gt;data[i]&#x3D;e;</span><br><span class="line">    L-&gt;length++;</span><br><span class="line">    return true;</span><br><span class="line">&#125;</span><br><span class="line">bool ListDelete(SqList *&amp;L,int i,ElemType &amp;e)&#123;</span><br><span class="line">    int j;</span><br><span class="line">    if(i&lt;1||i&gt;L-&gt;length)</span><br><span class="line">        return false;</span><br><span class="line">    i--;</span><br><span class="line">    e&#x3D;L-&gt;data[i];</span><br><span class="line">    for(j&#x3D;i;j&lt;L-&gt;length-1;j++)</span><br><span class="line">        L-&gt;data[j]&#x3D;L-&gt;data[j+1];</span><br><span class="line">    L-&gt;length--;</span><br><span class="line">    return true;</span><br><span class="line">&#125;</span><br><span class="line">int main()&#123;</span><br><span class="line">    SqList* L;</span><br><span class="line">    ElemType e;</span><br><span class="line">    printf(&quot;顺序表的基本运算如下：\n&quot;);</span><br><span class="line">    printf(&quot;（1)初始化顺序表L\n&quot;);</span><br><span class="line">    InitList(L);</span><br><span class="line">    printf(&quot;（2)依次插入a,b,c,d,e元素\n&quot;);</span><br><span class="line">    ListInsert(L,1,&#39;a&#39;);</span><br><span class="line">    ListInsert(L,2,&#39;b&#39;);</span><br><span class="line">    ListInsert(L,3,&#39;c&#39;);</span><br><span class="line">    ListInsert(L,4,&#39;d&#39;);</span><br><span class="line">    ListInsert(L,5,&#39;e&#39;);</span><br><span class="line">    printf(&quot;（3)输出顺序表L:&quot;);</span><br><span class="line">    DispList(L);</span><br><span class="line">    printf(&quot;（4)顺序表L长度：%d\n&quot;,ListLength(L));</span><br><span class="line">    printf(&quot;（5)顺序表L为%s\n&quot;,(ListEmpty(L)?&quot;空&quot;:&quot;非空&quot;));</span><br><span class="line">    GetElem(L,3,e);</span><br><span class="line">    printf(&quot;（6)顺序表L的第3个元素：%c\n&quot;,e);</span><br><span class="line">    printf(&quot;（7)元素a的位置：%d\n&quot;,LocateElem(L,&#39;a&#39;));</span><br><span class="line">    printf(&quot;（8)在第4个元素位置上插入f元素\n&quot;);</span><br><span class="line">    ListInsert(L,4,&#39;f&#39;);</span><br><span class="line">    printf(&quot;（9)输出顺序表L:&quot;);DispList(L);</span><br><span class="line">    printf(&quot;（10)删除L的第3个元素\n&quot;);</span><br><span class="line">    ListDelete(L,3,e);</span><br><span class="line">    printf(&quot;（11)输出顺序表L:&quot;);DispList(L);</span><br><span class="line">    printf(&quot;（12)释放顺序表L\n&quot;);</span><br><span class="line">    DestroyList(L);</span><br><span class="line">    return 1;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
